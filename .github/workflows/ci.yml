name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-build-balance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Balance Check
        run: npm run balance-check -- --runs=50
