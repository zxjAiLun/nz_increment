name: Balance Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

jobs:
  slow-balance-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Slow Balance Check
        run: npm run balance-check -- --runs=500
